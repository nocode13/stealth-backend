services:
  postgres:
    image: postgres:16-alpine
    container_name: stealth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stealth
      POSTGRES_PASSWORD: stealth
      POSTGRES_DB: stealth
    ports:
      - '5432:5432'
    volumes:
      - stealth-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stealth -d stealth']
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: stealth-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: stealth-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: stealth
      MINIO_ROOT_PASSWORD: stealth123
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # веб-консоль
    volumes:
      - stealth-minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: stealth-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 stealth stealth123 &&
      mc mb -p local/catalog &&
      mc anonymous set download local/catalog
      "

volumes:
  stealth-pg-data:
  stealth-minio-data:
