services:
  postgres:
    image: postgres:16-alpine
    container_name: stealth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stealth
      POSTGRES_PASSWORD: stealth
      POSTGRES_DB: stealth
    ports:
      - '5432:5432'
    volumes:
      - stealth-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stealth -d stealth']
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: stealth-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  stealth-pg-data:
