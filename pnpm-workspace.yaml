# Монорепы тут нет, но pnpm 9 (его использует Nixpacks на Railway) требует
# packages в workspace-файле — без него install падает «packages field missing».
packages: []

# allowBuilds — поле pnpm 10+; pnpm 9 его игнорирует и запускает postinstall сам.
allowBuilds:
  '@prisma/engines': true
  '@prisma/client': true
  '@scarf/scarf': false
  bcrypt: true
  prisma: true
  unrs-resolver: true
